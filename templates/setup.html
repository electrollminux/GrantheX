<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GrantheX Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body { background-color: #f8f9fa; } </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-5 shadow-lg border-0" style="width: 500px; border-radius: 15px;">
            <div class="text-center mb-4">
                <img src="/favicon.ico" width="40" height="40" class="mb-3 rounded">
                <h3 class="fw-bold text-primary">Welcome to GrantheX</h3>
                <p class="text-muted small">Your intelligent offline-first AI notebook.</p>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">1. Groq API Key</label>
                <input type="password" id="api-key" class="form-control" placeholder="gsk_...">
                <small class="text-muted">Get this for free at console.groq.com</small>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold">2. Workspace Folder</label>
                <div class="input-group">
                    <input type="text" id="workspace-path" class="form-control" value="{{ default_path }}">
                    <button class="btn btn-outline-secondary fw-bold" type="button" id="browse-btn" onclick="browseFolder()">Browse...</button>
                </div>
                <small class="text-muted">Where your .gex notebooks will be saved.</small>
            </div>
            
            <button class="btn btn-primary w-100 fw-bold py-2 mt-2" onclick="saveSetup()">Complete Setup</button>
        </div>
    </div>

    <script>
        // Native Folder Picker Logic
        async function browseFolder() {
            const btn = document.getElementById('browse-btn');
            const originalText = btn.innerText;
            btn.innerText = "...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/select_folder');
                const data = await response.json();
                
                if (data.path) {
                    document.getElementById('workspace-path').value = data.path;
                }
            } catch (err) {
                console.error("Failed to open dialog", err);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // Setup Save Logic
        function saveSetup() {
            const apiKey = document.getElementById('api-key').value.trim();
            const workspacePath = document.getElementById('workspace-path').value.trim();
            
            if(!apiKey || !workspacePath) return alert("Please fill in all fields.");
            
            const btn = document.querySelector('button.btn-primary');
            btn.innerText = "Configuring..."; btn.disabled = true;

            fetch('/api/setup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({api_key: apiKey, workspace_path: workspacePath})
            }).then(r => r.json()).then(data => {
                if(data.status === 'success') window.location.reload();
            });
        }
    </script>
</body>
</html>
